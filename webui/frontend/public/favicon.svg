<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </radialGradient>
    <radialGradient id="node-a" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#89dceb"/>
      <stop offset="100%" stop-color="#74c7ec"/>
    </radialGradient>
    <radialGradient id="node-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a6e3a1"/>
      <stop offset="100%" stop-color="#40a02b"/>
    </radialGradient>
    <radialGradient id="node-c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cba6f7"/>
      <stop offset="100%" stop-color="#8839ef"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#313244" stroke-width="1"/>

  <!-- Links between nodes -->
  <line x1="32" y1="14" x2="48" y2="42" stroke="#585b70" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="32" y1="14" x2="16" y2="42" stroke="#585b70" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="16" y1="42" x2="48" y2="42" stroke="#585b70" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Node A (top — cyan) -->
  <circle cx="32" cy="14" r="6" fill="url(#node-a)" filter="url(#glow)"/>

  <!-- Node B (bottom-right — green) -->
  <circle cx="48" cy="42" r="6" fill="url(#node-b)" filter="url(#glow)"/>

  <!-- Node C (bottom-left — purple) -->
  <circle cx="16" cy="42" r="6" fill="url(#node-c)" filter="url(#glow)"/>
</svg>
