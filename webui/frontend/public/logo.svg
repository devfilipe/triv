<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <radialGradient id="bg-logo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </radialGradient>
    <radialGradient id="logo-node-a" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#89dceb"/>
      <stop offset="100%" stop-color="#74c7ec"/>
    </radialGradient>
    <radialGradient id="logo-node-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a6e3a1"/>
      <stop offset="100%" stop-color="#40a02b"/>
    </radialGradient>
    <radialGradient id="logo-node-c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cba6f7"/>
      <stop offset="100%" stop-color="#8839ef"/>
    </radialGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cdd6f4"/>
      <stop offset="100%" stop-color="#a6adc8"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="280" height="80" rx="14" fill="url(#bg-logo)"/>
  <rect x="0" y="0" width="280" height="80" rx="14" fill="none" stroke="#313244" stroke-width="1"/>

  <!-- ── Icon group (centered at x=50, y=40) ── -->

  <!-- Links -->
  <line x1="50" y1="16" x2="68" y2="56" stroke="#585b70" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <line x1="50" y1="16" x2="32" y2="56" stroke="#585b70" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <line x1="32" y1="56" x2="68" y2="56" stroke="#585b70" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

  <!-- Node A — top (cyan) -->
  <circle cx="50" cy="16" r="8" fill="url(#logo-node-a)"/>

  <!-- Node B — bottom-right (green) -->
  <circle cx="68" cy="56" r="8" fill="url(#logo-node-b)"/>

  <!-- Node C — bottom-left (purple) -->
  <circle cx="32" cy="56" r="8" fill="url(#logo-node-c)"/>

  <!-- Divider -->
  <line x1="100" y1="18" x2="100" y2="62" stroke="#313244" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ── Wordmark ── -->
  <text
    x="120"
    y="57"
    font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
    font-size="38"
    font-weight="700"
    letter-spacing="-1"
    fill="url(#text-grad)"
  >triv</text>

</svg>
