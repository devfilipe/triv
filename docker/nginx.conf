server {
    listen 80;

    # Backend runs on host network; reached via host.docker.internal
    # (set by extra_hosts in docker-compose.yml → resolves from /etc/hosts).

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass         http://host.docker.internal:8481;
        proxy_set_header   Host $host;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        # SSE: disable buffering so events stream in real time
        proxy_buffering    off;
        proxy_cache        off;
    }

    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass         http://host.docker.internal:8481;
        proxy_set_header   Host $host;
    }

    location /ws/ {
        proxy_pass         http://host.docker.internal:8481;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}
